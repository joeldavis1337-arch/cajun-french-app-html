    const css = `
      .shell{display:flex;flex-direction:column;height:100%;overflow:hidden}

      .logo-icon{font-size:2rem}
      .tabs{flex-shrink:0;display:flex;background:#0D1627;border-bottom:2px solid #1E3058}

      .section-card{background:#0D1627;border:1px solid #1E3058;border-radius:6px;margin-bottom:12px;overflow:hidden}
      .section-header{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;border-left:4px solid #C49A3C;transition:background .15s;user-select:none}
      .section-header:active{background:#111E35}
      .section-title{font-family:'Playfair Display',serif;font-size:1rem;color:#F0E8D0}
      .section-meta{display:flex;align-items:center;gap:8px}

      tbody tr:nth-child(odd){background:#111E35}
      tbody tr:nth-child(even){background:#0F1B30}
      tbody td{padding:9px 12px;font-size:.86rem;vertical-align:top}
      .td-cajun{color:#F0E8D0;font-weight:600}
      .td-pron{color:#E8C06A;font-family:'DM Mono',monospace;font-size:.78rem;font-style:italic}
      .td-meaning{color:#7B8EAA;font-size:.83rem}
      .formula-grid{display:grid;gap:10px;padding:14px}
      .formula{background:#111E35;border:1px solid #1E3058;border-left:4px solid #C49A3C;border-radius:4px;padding:12px 14px}
      .formula-label{font-size:.7rem;color:#7B8EAA;font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
      .formula-code{font-family:'DM Mono',monospace;font-size:.88rem;color:#4D7ACC;margin-bottom:5px}
      .formula-ex{font-size:.81rem;color:#7B8EAA;font-style:italic}
      .rules-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
      @media(max-width:480px){.rules-grid{grid-template-columns:1fr}}
      .rule-card{background:#111E35;border:1px solid #1E3058;border-radius:4px;padding:10px 12px}
      .rule-label{font-size:.68rem;color:#C49A3C;font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
      .rule-old{color:#7B8EAA;font-size:.82rem;text-decoration:line-through;text-decoration-color:#8B3A3A;margin-bottom:2px}
      .rule-new{color:#F0E8D0;font-size:.88rem;font-weight:600}
      .rule-note{color:#7B8EAA;font-size:.74rem;margin-top:3px;font-style:italic}

      .power-ex{color:#4D7ACC;font-size:.74rem;font-style:italic;margin-top:3px}

      textarea::placeholder{color:#7B8EAA;font-style:italic}
      .translate-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1A3266,#2450A0);border:none;border-radius:6px;color:#F0E8D0;font-family:'Playfair Display',serif;font-size:1rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;-webkit-appearance:none}
      .translate-btn:active:not(:disabled){background:linear-gradient(135deg,#2450A0,#C49A3C);transform:scale(.98)}

      @keyframes spin{to{transform:rotate(360deg)}}
      .output{background:#0D1627;border:1px solid #1E3058;border-radius:6px;overflow:hidden;margin-top:14px;animation:fadeUp .25s ease}

      .saved-card{background:#0D1627;border:1px solid #1E3058;border-radius:4px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}

        ["S'il te plaît","seel teh PLAY","Please (informal)"],
      ]},
      {title:"Cajun-Specific Words",rows:[
        ["Allons","ah-LOHN","Let's go"],
        ["Cher / Chère","SHA","Hon/Dear — term of endearment"],
        ["Lagniappe","LAN-yap","A little something extra"],
        ["Couillon","KOO-yohn","Fool/dummy (affectionate)"],
        ["C'est bon","say BOHN","That's good"],
        ["C'est tout","say TOO","That's all"],
        ["Fais do-do","fay doh-DOH","Dance / party"],
        ["C'est la vie","say lah VEE","That's life"],
        ["Vieux / Vieille","VYUH / VYAY","Old man/woman (affectionate)"],
      ]},
      {title:"Family — La Famille",rows:[
        ["Maman","mah-MAHN","Mom"],
        ["Papa","pah-PAH","Dad"],
        ["Mémère","MAY-mehr","Grandma"],
        ["Pépère","PAY-pehr","Grandpa"],
        ["Mon frère","mohn FREHR","My brother"],
        ["Ma soeur","mah SUHR","My sister"],
        ["Mon oncle","mohn OHN-kluh","My uncle"],
        ["Ma tante","mah TAHNT","My aunt"],
        ["Les enfants","lay zahn-FAHN","The children"],
      ]},
      {title:"Food & Drink",rows:[
        ["Manger","mahn-ZHAY","To eat"],
        ["Boire","BWAHR","To drink"],
        ["J'ai faim","zhay FEN","I'm hungry"],
        ["J'ai soif","zhay SWAHF","I'm thirsty"],
        ["Du riz","doo REE","Rice"],
        ["Des écrevisses","day zay-kreh-VEES","Crawfish"],
        ["Du boudin","doo boo-DEN","Boudin"],
        ["De la bière","deh lah bee-EHR","Beer"],
      ]},
      {title:"Parent Phrases — Car & Mealtime",rows:[
        ["Allons, vite!","ah-LOHN VEET","Let's go, hurry!"],
        ["Monte dans le char","mohn-TEH dahn luh SHAR","Get in the car"],
        ["Attache ta ceinture","ah-TASH tah sen-TYOOR","Buckle your seatbelt"],
        ["Reste tranquille","rest trahn-KEEL","Stay still"],
        ["Viens manger","vyen mahn-ZHAY","Come eat"],
        ["Mange ton assiette","mahnzh tohn ah-see-ET","Eat your plate"],
        ["Lave tes mains d'abord","lahv tay MEN dah-BOR","Wash your hands first"],
        ["On mange ensemble","ohn mahnzh ahn-SAHM-bluh","We eat together"],
      ]},
      {title:"Parent Phrases — Praise & Bedtime",rows:[
        ["C'est bon, cher!","say BOHN SHA","Good job, hon!"],
        ["T'es smart, toi","tay SMART twah","You're smart, you"],
        ["Je suis fier de toi","zhuh swee fee-YEH duh TWAH","I'm proud of you"],
        ["C'est ça!","say SAH","That's it!"],
        ["Fais de beaux rêves","fay duh BOH REV","Have sweet dreams"],
        ["Je t'aime, cher","zhuh TEM SHA","I love you, hon"],
        ["Bonne nuit","bohn NWEE","Good night"],
        ["Va te coucher","vah tuh koo-SHAY","Go to bed"],
      ]},
    ];

    const FORMULAS = [
      {label:"Basic Statement",       code:"Subject  →  Verb  →  Object",  ex:"Je mange du riz — I eat rice"},
      {label:"Command (Imperative)",  code:"Verb  →  Object",               ex:"Mange ton riz — Eat your rice"},
      {label:"Chained Commands",      code:"Command  +  et  +  Command",    ex:"Mange ton riz et bois ton lait"},
      {label:"Question (raise voice)",code:"Statement  + ↗",               ex:"T'as faim? — You hungry?"},
    ];

    const RULES = [
      {label:"Drop the ne",        old:"Je ne sais pas",        new_:"Je sais pas",  note:"Cajun drops ne every time"},
      {label:"Use on not nous",    old:"Nous mangeons",         new_:"On mange",     note:"on = we, always"},
      {label:"Informal questions", old:"Est-ce que t'as faim?", new_:"T'as faim?",   note:"Just raise intonation"},
      {label:"Cajun for car",      old:"la voiture",            new_:"le char",      note:"char = car in Cajun"},
    ];

    const POWER = [
      {word:"Maintenant",   pron:"mahn-tuh-NAHN", meaning:"Now",          ex:"Viens ici maintenant"},
      {word:"Vite",         pron:"VEET",           meaning:"Quick/Hurry",  ex:"Allons, vite!"},
      {word:"S'il te plaît",pron:"seel teh PLAY",  meaning:"Please",       ex:"Assis-toi, s'il te plaît"},
      {word:"Encore",       pron:"ahn-KOR",        meaning:"Again/More",   ex:"Encore du riz?"},
      {word:"Assez",        pron:"ah-SAY",         meaning:"Enough",       ex:"C'est assez"},
      {word:"D'abord",      pron:"dah-BOR",        meaning:"First",        ex:"Lave tes mains d'abord"},
      {word:"Ensemble",     pron:"ahn-SAHM-bluh",  meaning:"Together",     ex:"On mange ensemble"},
      {word:"Et",           pron:"AY",             meaning:"And (chains)", ex:"Viens et assis-toi"},
    ];

    async function translateToCajun(english) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:`You are a Cajun French language expert. Translate English into authentic Louisiana Cajun French — not standard Parisian French.

STRICT RULES:
- Translate ONLY what the user wrote. Do not add words, endearments, or flavor that are not in the original phrase.
- Do NOT add "cher", "chère", "petit", "petite", or any term of endearment unless the user's phrase already contains one (e.g. "buddy", "hon", "sweetie").
- Do use genuine Cajun grammar patterns: drop "ne" in negatives, use "on" instead of "nous", use "char" for car, etc.
- Keep the translation as close to the original meaning as possible.

Respond ONLY with valid JSON, no markdown:
{"cajun":"phrase","pronunciation":"CAPS=stress e.g. bohn-ZHOOR","literal":"literal meaning if different","breakdown":[{"cajun":"word","pronunciation":"pron","english":"meaning"}],"note":"1-2 sentences on Cajun grammar/vocab used"}`,
          messages:[{role:"user",content:`Translate to Cajun French: "${english}"`}]
        })
      });
      const data = await res.json();
      const text = data.content?.find(b=>b.type==="text")?.text||"";
      return JSON.parse(text.replace(/```json|```/g,"").trim());
    }

    function Section({title, count, children}) {
      const [open, setOpen] = useState(false);
      return (
        <div className="section-card">
          <div className="section-header" onClick={()=>setOpen(o=>!o)}>
            <span className="section-title">{title}</span>
            <div className="section-meta">
              <span className="section-count">{count}</span>
              <span className={`chevron ${open?"open":""}`}>▼</span>
            </div>
          </div>
          {open && children}
        </div>
      );
    }

    function LearnTab() {
      return (
        <div className="learn">
          <div className="tip">
            <strong>Pronunciation Key</strong>
            CAPS = stressed syllable &nbsp;•&nbsp; "zh" = soft J (like "measure") &nbsp;•&nbsp; "ohn" = nasal O &nbsp;•&nbsp; SHA = cher/chère &nbsp;•&nbsp; Final consonants often softened
          </div>
          <Section title="Sentence Structure & Formulas" count="4 patterns">
            <div className="formula-grid">
              {FORMULAS.map((f,i)=>(
                <div className="formula" key={i}>
                  <div className="formula-label">{f.label}</div>
                  <div className="formula-code">{f.code}</div>
                  <div className="formula-ex">{f.ex}</div>
                </div>
              ))}
            </div>
          </Section>
          <Section title="Cajun Shortcuts vs Standard French" count="4 rules">
            <div className="rules-grid">
              {RULES.map((r,i)=>(
                <div className="rule-card" key={i}>
                  <div className="rule-label">{r.label}</div>
                  <div className="rule-old">{r.old}</div>
                  <div className="rule-new">{r.new_}</div>
                  <div className="rule-note">{r.note}</div>
                </div>
              ))}
            </div>
          </Section>
          <Section title="Power Words — Add to Any Command" count={`${POWER.length} words`}>
            <div className="power-grid">
              {POWER.map((p,i)=>(
                <div className="power-card" key={i}>
                  <div className="power-word">{p.word}</div>
                  <div className="power-pron">{p.pron}</div>
                  <div className="power-meaning">{p.meaning}</div>
                  <div className="power-ex">e.g. {p.ex}</div>
                </div>
              ))}
            </div>
          </Section>
          {VOCAB.map((sec,i)=>(
            <Section key={i} title={sec.title} count={`${sec.rows.length} phrases`}>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Cajun French</th><th>Pronunciation</th><th>Meaning</th></tr></thead>
                  <tbody>
                    {sec.rows.map(([c,p,m],j)=>(
                      <tr key={j}>
                        <td className="td-cajun">{c}</td>
                        <td className="td-pron">{p}</td>
                        <td className="td-meaning">{m}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Section>
          ))}
        </div>
      );
    }

    function TranslateTab() {
      const [input,   setInput]   = useState("");
      const [result,  setResult]  = useState(null);
      const [loading, setLoading] = useState(false);
      const [error,   setError]   = useState(null);
      const [saved,   setSaved]   = useState([]);

      const run = async () => {
        if (!input.trim()) return;
        setLoading(true); setError(null); setResult(null);
        try {
          const data = await translateToCajun(input.trim());
          setResult({english:input.trim(),...data});
        } catch(e) {
          setError("Translation failed — check your connection and try again.");
        }
        setLoading(false);
      };

      return (
        <div className="translate">
          <div className="tip">
            <strong>How to use</strong>
            Type any English phrase and get authentic Cajun French with full pronunciation and a word-by-word breakdown.
          </div>
          <div className="input-block">
            <div className="input-label"><span className="dot"/>English phrase</div>
            <textarea rows={3}
              placeholder="e.g. Eat your food before you go outside…"
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();run();}}}
            />
          </div>
          <button className="translate-btn" onClick={run} disabled={loading||!input.trim()}>
            {loading?<><div className="btn-spinner"/>Translating…</>:"Translate to Cajun French →"}
          </button>
          {error && <div className="error-box">{error}</div>}
          {result && (
            <div className="output">
              <div className="output-header">
                <span className="output-header-title">Cajun French</span>
                <button className="save-btn" style={{marginLeft:"auto"}} onClick={()=>setSaved(s=>[result,...s])}>★ Save</button>
              </div>
              <div className="result-main">
                <div className="result-cajun">{result.cajun}</div>
                <div className="result-pron">{result.pronunciation}</div>
              </div>
              {result.literal && result.literal!==result.english && (
                <div className="result-section">
                  <div className="result-section-label">Literal meaning</div>
                  <div className="note-text">{result.literal}</div>
                </div>
              )}
              {result.breakdown?.length>0 && (
                <div className="result-section">
                  <div className="result-section-label">Word by word</div>
                  <div className="chips">
                    {result.breakdown.map((w,i)=>(
                      <div className="word-chip" key={i}>
                        <div className="word-cajun">{w.cajun}</div>
                        <div className="word-pron">{w.pronunciation}</div>
                        <div className="word-en">{w.english}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {result.note && (
                <div className="result-section pb">
                  <div className="result-section-label">Cajun note</div>
                  <div className="note-text" dangerouslySetInnerHTML={{__html:result.note.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")}}/>
                </div>
              )}
            </div>
          )}
          {saved.length>0 && (
            <div className="saved-section">
              <div className="saved-title">★ Saved Phrases <span style={{color:"#7B8EAA",fontFamily:"'DM Mono',monospace",fontSize:".78rem"}}>({saved.length})</span></div>
              {saved.map((s,i)=>(
                <div className="saved-card" key={i}>
                  <div>
                    <div className="saved-en">{s.english}</div>
                    <div className="saved-cajun">{s.cajun}</div>
                    <div className="saved-pron">{s.pronunciation}</div>
                  </div>
                  <button className="del-btn" onClick={()=>setSaved(sv=>sv.filter((_,j)=>j!==i))}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("learn");
      return (
        <>
          <style>{css}</style>
          <div className="shell">
            <div className="header">
              <span className="logo-icon">⚜️</span>
              <div className="header-text">
                <div className="logo">Cajun <span>French</span></div>
                <div className="tagline">parlez comme chez vous</div>
              </div>
            </div>
            <div className="tabs">
              <button className={`tab ${tab==="learn"?"active":""}`} onClick={()=>setTab("learn")}>📖 Learn</button>
              <button className={`tab ${tab==="translate"?"active":""}`} onClick={()=>setTab("translate")}>🔄 Translate</button>
            </div>
            <div className="content">
              {tab==="learn"     && <LearnTab/>}
              {tab==="translate" && <TranslateTab/>}
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
